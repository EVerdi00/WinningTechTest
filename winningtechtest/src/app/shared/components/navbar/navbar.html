<nav class="navbar">
  <a routerLink="/" class="navbar__brand">WinningStore</a>
  <ul class="navbar__links">
    <li>
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
        Home
      </a>
    </li>
    <li>
      <a routerLink="/products" routerLinkActive="is-active">
        Products

        }
      </a>
    </li>
  </ul>
</nav>
