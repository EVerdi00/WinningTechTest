<dialog #dialog class="modal" (close)="closed.emit()">
  @if (product(); as p) {
    <div class="modal__content">
      <button type="button" class="modal__close" (click)="close()" aria-label="Close">×</button>

      <div class="modal__body">
        <img class="modal__image" [src]="p.image" [alt]="p.name" />

        <div class="modal__info">
          <h2 class="modal__name">{{ p.name }}</h2>
          <p class="modal__sku">SKU: {{ p.sku }}</p>

          <div class="modal__pricing">
            <span class="modal__price">{{ p.price | currency:'USD':'symbol':'1.0-0' }}</span>
            <span class="modal__rrp">RRP: {{ p.rrp | currency:'USD':'symbol':'1.0-0' }}</span>
          </div>

          <p class="modal__added">✓ Added to Cart</p>
        </div>
      </div>
    </div>
  }
</dialog>
